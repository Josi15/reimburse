; Supervisor config untuk deployment VPS tanpa Docker (Phase 22).
; Salin ke /etc/supervisor/conf.d/rms-worker.conf lalu:
;   sudo supervisorctl reread && sudo supervisorctl update && sudo supervisorctl start rms-queue:*

[program:rms-queue]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/rms/artisan queue:work --sleep=3 --tries=3 --max-time=3600
numprocs=2
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
redirect_stderr=true
stdout_logfile=/var/www/rms/storage/logs/queue-worker.log
stopwaitsecs=3600

[program:rms-scheduler]
process_name=%(program_name)s
command=php /var/www/rms/artisan schedule:work
autostart=true
autorestart=true
user=www-data
redirect_stderr=true
stdout_logfile=/var/www/rms/storage/logs/scheduler.log
