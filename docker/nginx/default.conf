# Nginx untuk Laravel (Phase 22). SSL diterminasi di reverse proxy/certbot
# (lihat docs/22-deployment.md).
server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;

    client_max_body_size 12m;

    # Header keamanan tambahan di edge (melengkapi middleware aplikasi)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    # Asset statis ber-hash (Vite) — cache agresif
    location ~* \.(?:js|css|woff2?|ttf|png|jpe?g|gif|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }
}
